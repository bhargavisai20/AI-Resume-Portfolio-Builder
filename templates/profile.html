{% extends "base.html" %}
{% block content %}

<div class="card p-5 shadow-lg mx-auto" style="max-width:700px;">

    <h2 class="mb-4 text-center">Edit Profile 👤</h2>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ current_user.phone }}">
        </div>

        <div class="mb-3">
            <label>LinkedIn</label>
            <input type="text" name="linkedin" class="form-control" value="{{ current_user.linkedin }}">
        </div>

        <div class="mb-3">
            <label>GitHub</label>
            <input type="text" name="github" class="form-control" value="{{ current_user.github }}">
        </div>

        <div class="mb-3">
            <label>Location</label>
            <input type="text" name="location" class="form-control" value="{{ current_user.location }}">
        </div>

        <div class="mb-3">
            <label>Bio</label>
            <textarea name="bio" class="form-control">{{ current_user.bio }}</textarea>
        </div>

        <div class="mb-3">
            <label>Profile Photo</label>
            <input type="file" name="profile_photo" class="form-control">
        </div>

        <button class="btn btn-custom w-100">Save Profile</button>

    </form>

</div>

{% endblock %}
