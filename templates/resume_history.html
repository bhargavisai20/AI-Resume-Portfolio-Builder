{% extends "base.html" %}
{% block content %}

<div class="card p-5 shadow-lg">

    <h2 class="mb-4">Resume History 📚</h2>

    {% if resumes %}
        <ul class="list-group">
            {% for resume in resumes %}
            <li class="list-group-item bg-dark text-white d-flex justify-content-between">
                {{ resume.created_at.strftime("%d %b %Y %H:%M") }}
                <a href="{{ url_for('generate_ai_resume') }}" class="text-info">View</a>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No resumes generated yet.</p>
    {% endif %}

</div>

{% endblock %}
